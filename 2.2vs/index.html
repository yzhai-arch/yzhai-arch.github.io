    <script >
    const enter = document.querySelector(".enter");
const enter1 = document.querySelector(".enter1");
const background = document.querySelector(".background");
const help = document.querySelector(".help");
const help1 = document.querySelector(".help1");

enter.addEventListener("mouseenter", () => {
  enter1.style.backgroundImage = 'url("enter2.PNG")';
 
});

enter.addEventListener("mouseleave", () => {
  enter1.style.backgroundImage = 'url("enter1.PNG")';
});
enter.addEventListener("click", () => {
  enter.style.display = "none";
  enter1.style.display = "none";
  background.style.display = "none";
  gosave.style.display = "none";  
  help.style.display = "none";
  help1.style.display = "none";
});
const gosave = document.querySelector(".gosave");

enter.addEventListener("mouseenter", () => {
  enter1.style.backgroundImage = 'url("enter2.PNG")';
  gosave.style.opacity = "1";     // 显示
});

enter.addEventListener("mouseleave", () => {
  enter1.style.backgroundImage = 'url("enter1.PNG")';
  gosave.style.opacity = "0";     // 变回透明
});
const save = document.querySelector(".save");
const sheep = document.querySelector(".sheep");
const sheep1 = document.querySelector(".sheep1");
const sheep2 = document.querySelector(".sheep2");
const words1 = document.querySelector(".words1");
const words12 = document.querySelector(".words12");
const words13 = document.querySelector(".words13");


// Event listener for the "save her" text
save.addEventListener("click", () => {
  // Show the first sheep
  sheep.style.display = "block";
  
  // After 1 second, hide the first sheep and show the second
  setTimeout(() => {
    
    sheep1.style.display = "block";
  }, 1000);
  
  // After 2 seconds (1 second for sheep1 to display), hide sheep1 and show sheep2
  setTimeout(() => {
    
    sheep2.style.display = "block";
    words1.style.display = "block";
    words12.style.display = "block";
    words13.style.display = "block";
  }, 2000);
});
    </script>
